name: Update Predictions

on:
  schedule:
    # Türkiye saati ile 04:30 (UTC+3 → cron "30 1 * * *")
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Ensure predictions.json exists
        run: |
          mkdir -p docs
          if [ ! -f docs/predictions.json ]; then
            echo "{}" > docs/predictions.json
          fi

      - name: Generate Predictions
        run: python generate_predictions.py
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}

      - name: Update Results
        run: python update_results.py
