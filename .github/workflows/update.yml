name: Matchly Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install soccerdata pandas requests

    - name: Fetch Fixtures
      run: python automation/fixtures.py

    - name: Generate Predictions
      run: python automation/generate_predictions.py

    - name: Update Results
      run: python automation/update_results.py

    - name: Commit JSON
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add docs/predictions.json
        git commit -m "update predictions" || echo "no changes"
        git push
